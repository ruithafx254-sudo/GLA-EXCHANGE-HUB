    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #0f1115; --text: #fff; --input-bg: #16191e; --border: #222; }
        [data-theme="light"] { --bg: #f4f7f6; --panel: #ffffff; --text: #1a1a1a; --input-bg: #f0f2f5; --border: #ddd; }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 40px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; transition: 0.3s; }
        
        .theme-bar { width: 100%; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: flex-end; padding: 10px 5%; box-sizing: border-box; }
        .theme-btn { background: var(--gold); border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 800; font-size: 10px; color: #000; text-transform: uppercase; }

        .ticker-wrap { width: 100%; background: #111; border-bottom: 1px solid var(--gold); padding: 10px 0; font-size: 11px; color: var(--gold); overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; white-space: nowrap; animation: scrollText 25s linear infinite; padding-left: 100%; }
        @keyframes scrollText { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .panel { background: var(--panel); border: 1px solid var(--border); padding: 25px; width: 92%; max-width: 480px; box-sizing: border-box; margin-top: 20px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .tag { font-size: 10px; color: var(--gold); font-weight: bold; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; }
